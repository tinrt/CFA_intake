{% extends "base.html" %}

{% block title %}Login | Donation Warehouse{% endblock %}

{% block content %}
<div class="panel" style="max-width: 460px; margin: 40px auto;">
    <h2 style="margin-top: 0;">Log In</h2>
    <p class="muted">Sign in to record and review donations.</p>

    {% if form.errors %}
        <p style="color: #b42318;">Invalid username or password.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <label for="id_username">Username</label>
            <input class="form-control" type="text" name="username" id="id_username" required autofocus>
        </div>
        <div class="form-row">
            <label for="id_password">Password</label>
            <input class="form-control" type="password" name="password" id="id_password" required>
        </div>
        <button class="btn" type="submit">Log In</button>
    </form>
</div>
{% endblock %}
